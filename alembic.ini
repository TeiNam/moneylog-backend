# Alembic 설정 파일
# sqlalchemy.url은 비워두고 env.py에서 동적으로 설정한다.

[alembic]
# 마이그레이션 스크립트 디렉토리
script_location = alembic

# 마이그레이션 파일명 템플릿 (날짜 기반)
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d%%(second).2d_%%(rev)s_%%(slug)s

# sqlalchemy.url은 env.py에서 동적으로 설정
sqlalchemy.url =

# 타임존 설정
timezone = Asia/Seoul

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
